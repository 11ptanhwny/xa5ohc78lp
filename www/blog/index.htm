<script>
const renderer = new marked.Renderer();
renderer.link = ({ href, title, text }) => {
const titleAttr = title ? ` title="${title}"` : '';
return `<a href="${href}" target="_blank" rel="noopener noreferrer"${titleAttr}>${text}</a>`;
};
renderer.heading = ({ text, depth }) => {
const idMatch = text.match(/\{#(.+?)\}/);
const id = idMatch ? idMatch[1] : text.toLowerCase().trim().replace(/[^\w]+/g, '-');
const cleanText = text.replace(/\{#.+?\}/, '').trim();
return `<h${depth} id="${id}">${cleanText}</h${depth}>`;
};
marked.use({ renderer });
function render() {
const container = document.getElementById('content');
const rawMarkdown = document.getElementById('markdown-source').innerHTML;
const mathBlocks = [];
let tempText = rawMarkdown.replace(/(\$\$[\s\S]+?\$\$|\$[^\$]+?\$)/g, (match) => {
mathBlocks.push(match);
return `%%MATH_${mathBlocks.length - 1}%%`;
});
let html = marked.parse(tempText);
html = html.replace(/%%MATH_(\d+)%%/g, (match, index) => {
return mathBlocks[index].replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
});
container.innerHTML = html;
if (window.MathJax && MathJax.typesetPromise) {
MathJax.typesetPromise([container]).then(() => {
container.classList.add('ready');
if (window.location.hash) {
const target = document.querySelector(window.location.hash);
if (target) target.scrollIntoView();
}
});
}
}
window.onload = render;
</script>
